<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorpresa ♡</title>
  <link rel="stylesheet" href="sorpresa.css">
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="petals-wrap" id="petals"></div>


  <section id="screen-stats" class="screen active">
    <div class="big-num" id="bigNum">365</div>
    <div class="num-label" id="numLabel">días de amistad</div>
    <div class="progress-dots" id="dots"></div>
    <button class="boton" id="btnNext">Siguiente</button>
  </section>

  
  <section id="screen-anime" class="screen">
    <p class="section-eyebrow">Nosotros en otro universo</p>
    <h2 class="section-title">Así nos imaginamos</h2>
    <div class="anime-pair">
      <div class="anime-card">
        <img id="animeB" src="" alt="Personaje 2">
        <p class="anime-label">Yo</p>
      </div>
      <div class="anime-heart">♡</div>
      <div class="anime-card">
        <img id="animeA" src="" alt="Personaje 1">
        <p class="anime-label">Tu</p>
      </div>
    </div>
    <button class="boton" id="btnVerFotos">Ver recuerdos ♡</button>
  </section>

  <!-- Pantalla 3: Galería de fotos -->
  <section id="screen-fotos" class="screen">
    <p class="section-eyebrow">Un año juntos</p>
    <h2 class="section-title"> recuerdos </h2>
    <div class="foto-grid" id="fotoGrid"></div>
    <button class="boton" id="btnVerMensaje" style="margin-top:24px">Ver mensaje ♡</button>
  </section>

  <!-- Pantalla 4: Mensaje final -->
  <section id="screen-msg" class="screen">
    <div class="msg-card">
      <p class="msg-text">
        Un año de risas, de planes,<br>
        de estar ahí sin importar qué.<br>
        Eso vale más que cualquier cosa.
      </p>
      <div class="divider"></div>
      <p class="msg-sub">Feliz aniversario, amigo/a.</p>
    </div>
    <div class="heart-footer">
      <span class="heart">♥</span>
      &nbsp; Siempre &nbsp;
      <span class="heart">♥</span>
    </div>
  </section>

  <script src="fotos.js"></script>
  <script src="sorpresa.js"></script>
</body>
</html>
