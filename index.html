<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06 · 08 · 2025</title>
  <link rel="stylesheet" href="inicio.css">
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="hero">
    <p class="eyebrow">Un día que comenzó una historia</p>
    <h1>06 · 08 · 2025</h1>
    <a href="sorpresa.html" class="boton">Abrir sorpresa ♡</a>
  </div>
  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    for(let i=0;i<160;i++) stars.push({ x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight, r:Math.random()*1.2+0.3, a:Math.random(), sp:Math.random()*0.008+0.003 });
    function draw() {
      ctx.clearRect(0,0,W,H);
      stars.forEach(s => { s.a+=s.sp; const alpha=(Math.sin(s.a)+1)/2*0.7+0.1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${alpha})`; ctx.fill(); });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
